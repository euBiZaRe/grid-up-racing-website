<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Grid Up Sim Racing</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            margin-top: 5rem;
            padding: 2rem;
        }
        .claims-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
        }
        .claims-table th, .claims-table td {
            padding: 1.25rem;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }
        .claims-table th {
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--primary);
        }
        .claims-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .status-pending { background: rgba(255,255,255,0.1); color: #fff; }
        .status-verified { background: rgba(0, 207, 255, 0.2); color: var(--primary); }
        .status-denied { background: rgba(255, 0, 153, 0.2); color: var(--secondary); }
        
        .action-btns {
            display: flex;
            gap: 10px;
        }
        .admin-access-denied {
            text-align: center;
            padding: 10rem 2rem;
            display: none;
        }
        .admin-content {
            display: none;
        }
        .team-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .team-card:hover {
            border-color: var(--primary);
            background: rgba(0, 207, 255, 0.03);
        }
        input, textarea, select {
            color: white !important;
        }
    </style>
</head>
<body class="admin-page">
    <nav id="navbar" class="scrolled">
        <div class="container nav-content">
            <a href="index.html" class="logo">GRID UP</a>
            <div class="nav-links">
                <a href="index.html#home">Home</a>
                <a href="roster.html">Roster</a>
                <a href="events.html">Events</a>
                <a href="login.html" id="login-link" class="btn btn-outline" style="padding: 0.5rem 1.25rem; font-size: 0.8rem; margin-left: 1rem;">Login</a>
            </div>
        </div>
    </nav>

    <main class="container admin-container">
        <!-- Access Denied -->
        <div id="access-denied" class="admin-access-denied">
            <h1 class="glow-text">ACCESS DENIED</h1>
            <p style="color: var(--text-muted); margin-top: 1rem;">You do not have administrative privileges to access this area.</p>
            <a href="index.html" class="btn btn-primary" style="margin-top: 2rem;">Return Home</a>
        </div>

        <!-- Admin Content -->
        <div id="admin-hub" class="admin-content">
            <header style="margin-bottom: 4rem; display: flex; justify-content: space-between; align-items: flex-end;">
                <div>
                    <p style="color: var(--primary); font-weight: 600; text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem; margin-bottom: 0.5rem;">Management Console</p>
                    <h1 class="glow-text" style="font-size: 3rem;" id="admin-title">Driver Claims</h1>
                </div>
                <div style="text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 1rem;">
                    <div style="display: flex; gap: 1rem;">
                        <button onclick="switchTab('claims')" class="btn btn-outline" id="tab-claims">Claims</button>
                        <button onclick="switchTab('races')" class="btn btn-outline" id="tab-races">Races</button>
                    </div>
                    <span id="admin-user-info" style="color: var(--text-muted); font-size: 0.8rem;">Logged in as: ...</span>
                </div>
            </header>

            <!-- Claims Section -->
            <div id="section-claims">
                <div class="glass" style="padding: 0; overflow-x: auto;">
                <table class="claims-table">
                    <thead>
                        <tr>
                            <th>Driver Name</th>
                            <th>iRacing ID</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="claims-list">
                        <!-- Loaded dynamically -->
                        <tr>
                            <td colspan="4" style="text-align: center; color: var(--text-muted);">Loading claim requests...</td>
                        </tr>
                    </tbody>
                </table>
                </div>
            </div>

            <!-- Race Management Section -->
            <div id="section-races" style="display: none;">
                <div class="glass" style="padding: 2rem; margin-bottom: 2rem;">
                    <h3 style="margin-bottom: 1.5rem; color: var(--primary);">Select Event</h3>
                    <select id="event-selector" class="btn btn-outline" style="width: 100%; text-align: left; padding: 1rem; background: rgba(0,0,0,0.3);" onchange="loadRaceData()">
                        <option value="">-- Choose an Event --</option>
                        <option value="imsa-classic-500">IMSA Classic 500</option>
                        <option value="nurburgring-24h">Nürburgring 24h</option>
                        <option value="thruxton-4h">4 Hours at Thruxton</option>
                        <option value="indy-500">Indy 500</option>
                        <option value="world-600">World 600</option>
                        <option value="watkins-glen-6h">Watkins Glen 6 Hour</option>
                    </select>
                </div>

                <div id="race-editor" style="display: none;">
                    <div id="teams-container">
                        <!-- Teams populate here -->
                    </div>
                    
                    <button onclick="addTeam()" class="btn btn-outline" style="width: 100%; margin-top: 1rem; border-style: dashed;">+ Add Team</button>
                    
                    <div style="margin-top: 3rem; display: flex; gap: 1rem;">
                        <button onclick="saveRaceData()" class="btn btn-primary" style="flex: 1;">Save All Changes</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Additional Admin Logic
        async function loadClaims() {
            console.log("Admin: Loading claims...");
            const list = document.getElementById('claims-list');
            if (!list) return;

            if (!db) {
                console.error("Admin: Firestore 'db' is NOT INITIALIZED!");
                list.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #ff0099;">Error: Database connection failed. Please refresh.</td></tr>';
                return;
            }

            try {
                const snapshot = await db.collection("claims").orderBy("timestamp", "desc").get();
                console.log("Admin: Firestore snapshot received, size:", snapshot.size);
                if (snapshot.empty) {
                    list.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-muted);">No claim requests found.</td></tr>';
                    return;
                }

                list.innerHTML = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const id = doc.id;
                    
                    // Safety Fallbacks
                    const discordName = data.discordName || "Unknown Driver";
                    const profileName = data.driverIdentity || discordName;
                    const avatar = data.avatar || "https://www.gravatar.com/avatar/00000000000000000000000000000000?d=mp&f=y";
                    
                    const row = document.createElement('tr');
                    
                    row.innerHTML = `
                        <td><strong style="color: var(--text-main);">${id}</strong></td>
                        <td style="font-family: monospace; color: var(--primary);">${data.iracingId}</td>
                        <td><span class="status-badge status-${data.status}">${data.status.toUpperCase()}</span></td>
                        <td>
                            <div class="action-btns">
                                ${data.status !== 'verified' ? `<button onclick="updateClaim('${id}', 'verified')" class="btn btn-primary" style="padding: 0.4rem 0.8rem; font-size: 0.7rem;">Approve</button>` : ''}
                                ${data.status !== 'denied' ? `<button onclick="updateClaim('${id}', 'denied')" class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.7rem; border-color: #ff0099; color: #ff0099;">Deny</button>` : ''}
                            </div>
                        </td>
                    `;
                    list.appendChild(row);
                });
            } catch (error) {
                console.error("Error loading claims:", error);
                list.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #ff0099;">Error loading data. Check permissions.</td></tr>';
            }
        }

        async function updateClaim(driverName, newStatus) {
            if (!confirm(`Are you sure you want to set ${driverName} to ${newStatus}?`)) return;
            
            try {
                await db.collection("claims").doc(driverName).update({
                    status: newStatus
                });
                alert("Status updated successfully!");
                loadClaims();
            } catch (error) {
                console.error("Error updating claim:", error);
                alert("Failed to update: " + error.message);
            }
        }

        // Check for admin privileges on load
        const ADMIN_UIDS = ['B0t4f4nqqpZIQKpT8Ed97xka5gM2'];

        function switchTab(tab) {
            document.getElementById('section-claims').style.display = tab === 'claims' ? 'block' : 'none';
            document.getElementById('section-races').style.display = tab === 'races' ? 'block' : 'none';
            document.getElementById('admin-title').textContent = tab === 'claims' ? 'Driver Claims' : 'Race Management';
            
            document.getElementById('tab-claims').classList.toggle('btn-primary', tab === 'claims');
            document.getElementById('tab-claims').classList.toggle('btn-outline', tab !== 'claims');
            document.getElementById('tab-races').classList.toggle('btn-primary', tab === 'races');
            document.getElementById('tab-races').classList.toggle('btn-outline', tab !== 'races');
        }

        async function loadRaceData() {
            const slug = document.getElementById('event-selector').value;
            const editor = document.getElementById('race-editor');
            const container = document.getElementById('teams-container');
            
            if (!slug) {
                editor.style.display = 'none';
                return;
            }
            
            editor.style.display = 'block';
            container.innerHTML = '<p style="text-align: center; color: var(--text-muted);">Loading race data...</p>';
            
            try {
                const doc = await db.collection("race_lineups").doc(slug).get();
                container.innerHTML = '';
                
                if (doc.exists && doc.data().teams) {
                    doc.data().teams.forEach((team, idx) => addTeamUI(team));
                } else {
                    addTeamUI(); // Add one empty team by default
                }
            } catch (error) {
                console.error("Error loading race data:", error);
                container.innerHTML = '<p style="color: #ff0099;">Error loading data.</p>';
            }
        }

        function addTeamUI(data = null) {
            const container = document.getElementById('teams-container');
            const teamDiv = document.createElement('div');
            teamDiv.className = 'glass team-card';
            teamDiv.style.padding = '2rem';
            teamDiv.style.marginBottom = '1.5rem';
            teamDiv.style.position = 'relative';
            
            const teamName = data ? data.name : '';
            const carClass = data ? data.car_class : '';
            const captain = data ? data.captain : '';
            const drivers = data ? data.drivers.join('\n') : '';
            
            teamDiv.innerHTML = `
                <button onclick="this.parentElement.remove()" style="position:absolute; top:1rem; right:1rem; background:none; border:none; color:#ff0099; cursor:pointer;">×</button>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div>
                        <label style="display:block; font-size: 0.7rem; color: var(--primary); margin-bottom: 0.5rem;">TEAM NAME</label>
                        <input type="text" class="team-name btn btn-outline" style="width:100%; text-align:left;" value="${teamName}" placeholder="e.g. GRiD UP Black">
                    </div>
                    <div>
                        <label style="display:block; font-size: 0.7rem; color: var(--primary); margin-bottom: 0.5rem;">CAR & CLASS</label>
                        <input type="text" class="team-car btn btn-outline" style="width:100%; text-align:left;" value="${carClass}" placeholder="e.g. Porsche 911 GT3 R">
                    </div>
                    <div>
                        <label style="display:block; font-size: 0.7rem; color: var(--primary); margin-bottom: 0.5rem;">TEAM CAPTAIN</label>
                        <input type="text" class="team-captain btn btn-outline" style="width:100%; text-align:left;" value="${captain}" placeholder="Driver Name">
                    </div>
                    <div>
                        <label style="display:block; font-size: 0.7rem; color: var(--primary); margin-bottom: 0.5rem;">DRIVER ROSTER (One per line)</label>
                        <textarea class="team-drivers btn btn-outline" style="width:100%; text-align:left; height: 100px; resize: vertical;" placeholder="Driver 1\nDriver 2...">${drivers}</textarea>
                    </div>
                </div>
            `;
            container.appendChild(teamDiv);
        }

        function addTeam() {
            addTeamUI();
        }

        async function saveRaceData() {
            const slug = document.getElementById('event-selector').value;
            const teamCards = document.querySelectorAll('.team-card');
            const teams = [];
            
            teamCards.forEach(card => {
                const name = card.querySelector('.team-name').value.trim();
                const car = card.querySelector('.team-car').value.trim();
                const captain = card.querySelector('.team-captain').value.trim();
                const driversText = card.querySelector('.team-drivers').value.trim();
                
                if (name) {
                    teams.push({
                        name: name,
                        car_class: car,
                        captain: captain,
                        drivers: driversText.split('\n').filter(d => d.trim())
                    });
                }
            });
            
            try {
                await db.collection("race_lineups").doc(slug).set({
                    teams: teams,
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("Race lineup saved successfully!");
            } catch (error) {
                console.error("Error saving race data:", error);
                alert("Error saving: " + error.message);
            }
        }

        firebase.auth().onAuthStateChanged((user) => {
            const adminHub = document.getElementById('admin-hub');
            const accessDenied = document.getElementById('access-denied');
            const userInfo = document.getElementById('admin-user-info');

            if (user && ADMIN_UIDS.includes(user.uid)) {
                adminHub.style.display = 'block';
                accessDenied.style.display = 'none';
                const adminName = user.displayName || user.email || user.uid;
                userInfo.textContent = `Logged in as Admin: ${adminName}`;
                switchTab('claims');
                loadClaims();
            } else {
                adminHub.style.display = 'none';
                accessDenied.style.display = 'block';
            }
        });
    </script>
</body>
</html>
