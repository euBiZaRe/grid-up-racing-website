<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upcoming Races | GRiD UP Sim Racing</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/G_2.png">
</head>
<body class="events-page">
    <nav id="navbar" class="scrolled">
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <img src="assets/logo.png" alt="GRiD UP" style="height: 40px; vertical-align: middle;">
            </a>
            <div class="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="nav-links">
                <a href="index.html#home">Home</a>
                <a href="index.html#about">About</a>
                <a href="team-app.html">Team App</a>
                <a href="roster.html">Roster</a>
                <a href="events.html">Events</a>
                <a href="shop.html">Shop</a>
                <a href="https://discord.gg/gridup" target="_blank"><img src="assets/discord_header.png" alt="Discord" style="height: 25px; vertical-align: middle;"></a>
                <a href="login.html" id="login-link" class="btn btn-outline" style="padding: 0.5rem 1.25rem; font-size: 0.8rem; margin-left: 1rem;">Login</a>
            </div>
        </div>
    </nav>

    <header class="hero hero-small">
        <img src="assets/bg-banner.png" alt="Upcoming Races" class="hero-img" style="opacity: 0.3;">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="glow-text">Upcoming Races</h1>
            <p style="color: var(--primary); font-weight: 600; text-transform: uppercase; letter-spacing: 2px;">The 2026 iRacing Special Events Season</p>
        </div>
    </header>

    <main class="container section" style="position: relative; overflow: hidden; padding-bottom: 2rem;">
        <div class="tread-overlay" style="opacity: 0.05;"></div>
        <div id="pastEventsSection" class="event-list custom-scrollbar" style="display: none; max-height: 500px; overflow-y: auto; margin-bottom: 3rem; opacity: 0.7; padding-right: 1.5rem; transition: all 0.3s ease;">
            <h2 style="text-align: center; color: var(--text-muted); margin-bottom: 2rem; font-size: 1.5rem;">2026 Completed Events</h2>
            
            <div id="dynamic-past-list"></div>

            <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 3rem 0;">
        </div>


        <div style="text-align: center; margin-bottom: 5rem;">
            <button id="togglePastEvents" class="btn btn-outline" style="min-width: 200px;">Show Past Events</button>
        </div>

        <div id="full-event-list" class="event-list">
            <p style="text-align: center; color: var(--text-muted); padding: 2rem;">Loading season schedule...</p>
        </div>

        <div style="text-align: center; margin-top: 4rem;">
            <a href="index.html" class="btn btn-outline">Back to Home</a>
        </div>
    </main>

    <section id="upcoming" class="section reveal">
        <div class="container">
            <h2 style="color: var(--primary); margin-bottom: 2rem; text-align: center;">Upcoming Races</h2>
            
            <div class="carousel-wrapper">
                <div class="carousel-nav">
                    <button class="carousel-btn prev-btn">←</button>
                    <button class="carousel-btn next-btn">→</button>
                </div>
                <div class="upcoming-races-container">
                    <div class="carousel-track" id="dynamic-upcoming-track">
                        <p style="text-align: center; color: var(--text-muted); width: 100%;">Loading upcoming events...</p>
                    </div>
                </div>
            </div>

            <div style="text-align: center; margin-top: 2rem;">
                <a href="index.html" class="btn btn-outline" style="padding: 0.6rem 1.2rem; font-size: 0.9rem;">Back to Home</a>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">

            <p style="color: var(--text-muted); font-size: 0.8rem;">&copy; 2026 GRiD UP SIM RACING. ALL RIGHTS RESERVED.</p>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="script.js?v=2"></script>
    <script src="js/auth.js"></script>
</body>
</html>
