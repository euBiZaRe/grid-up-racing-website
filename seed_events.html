<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seed Remaining 2026 iRacing Events to Firestore</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <!-- Our Auth Config -->
    <script src="js/auth.js"></script>
    
    <style>
        body { font-family: sans-serif; padding: 2rem; background: #0a0a0c; color: white; }
        button { padding: 1rem 2rem; background: #00cfff; border: none; color: black; font-weight: bold; cursor: pointer; border-radius: 4px; }
        #log { margin-top: 1rem; color: #00ff88; white-space: pre; font-family: monospace; }
    </style>
    <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>
    <h1>Seed Remaining 2026 Events</h1>
    <p>Click the button below to push all missing 2026 iRacing Special Events to the Firestore database.</p>
    <button onclick="seedDatabase()">Seed Database</button>
    <div id="log"></div>

    <script>
        const IMSA_SLOTS = [
            '#1: Friday 22:00 GMT (6:00PM EDT)', 
            '#2: Saturday 7:00 GMT (3:00AM EDT)', 
            '#3: Saturday 12:00 GMT (8:00AM EDT)', 
            '#4: Saturday 16:00 GMT (12:00PM EDT)'
        ];

        const EVENTS_TO_ADD = [
            { id: 'knoxville-nationals', name: 'Knoxville Nationals', date: 'August 4-9', startDate: '2026-08-04T22:00:00Z', slots: IMSA_SLOTS, classes: ['Sprint Car'] },
            { id: 'portimao-1000', name: 'Portimao 1000', date: 'August 14-15', startDate: '2026-08-14T22:00:00Z', slots: IMSA_SLOTS, classes: ['GTP', 'LMP2', 'GT3'] },
            { id: 'crandon-championship', name: 'Crandon Championship', date: 'August 25-30', startDate: '2026-08-25T22:00:00Z', slots: IMSA_SLOTS, classes: ['Pro 4'] },
            { id: 'southern-500', name: 'Southern 500', date: 'September 2-7', startDate: '2026-09-02T22:00:00Z', slots: IMSA_SLOTS, classes: ['NASCAR Next Gen'] },
            { id: 'suzuka-1000km', name: 'Suzuka 1000km', date: 'Sept 10-15', startDate: '2026-09-10T22:00:00Z', slots: IMSA_SLOTS, classes: ['GT3'] },
            { id: 'britcar-24hr', name: 'Britcar 24HR', date: 'September 18-20', startDate: '2026-09-18T22:00:00Z', slots: IMSA_SLOTS, classes: ['GT3', 'GT4', 'TCR'] },
            { id: 'petit-le-mans', name: 'Petit Le Mans', date: 'Sept 25-27', startDate: '2026-09-25T22:00:00Z', slots: IMSA_SLOTS, classes: ['GTP', 'LMP2', 'GT3'] },
            { id: 'bathurst-1000', name: 'Bathurst 1000', date: 'Oct 2-4', startDate: '2026-10-02T22:00:00Z', slots: IMSA_SLOTS, classes: ['V8 Supercar'] },
            { id: 'indy-8h', name: '8 Hours of Indianapolis', date: 'Oct 16-18', startDate: '2026-10-16T22:00:00Z', slots: IMSA_SLOTS, classes: ['GT3'] },
            { id: 'ff1600-festival', name: 'iRacing FF1600 Festival', date: 'Oct 30-31', startDate: '2026-10-30T22:00:00Z', slots: IMSA_SLOTS, classes: ['Ray FF1600'] },
            { id: 'homestead-championship', name: 'Homestead Championship', date: 'November 4-9', startDate: '2026-11-04T22:00:00Z', slots: IMSA_SLOTS, classes: ['NASCAR Next Gen'] },
            { id: 'sfl-mountain-showdown', name: 'SFL Mountain Showdown', date: 'November 13-15', startDate: '2026-11-13T22:00:00Z', slots: IMSA_SLOTS, classes: ['Super Formula Lights'] },
            { id: 'scca-runoffs', name: 'SCCA Runoffs', date: 'November 17-21', startDate: '2026-11-17T22:00:00Z', slots: IMSA_SLOTS, classes: ['Multiclass'] },
            { id: '992-endurance-cup', name: '992 Endurance Cup', date: 'November 27-29', startDate: '2026-11-27T22:00:00Z', slots: IMSA_SLOTS, classes: ['Porsche 911 GT3 Cup (992)'] },
            { id: 'winter-derby', name: 'Winter Derby', date: 'December 2-7', startDate: '2026-12-02T22:00:00Z', slots: IMSA_SLOTS, classes: ['Super Late Model'] },
            { id: 'chili-bowl', name: 'Chili Bowl', date: 'December 15-20', startDate: '2026-12-15T22:00:00Z', slots: IMSA_SLOTS, classes: ['Dirt Midget'] },
            { id: 'production-car-challenge', name: 'Production Car Challenge', date: 'December 18-19', startDate: '2026-12-18T22:00:00Z', slots: IMSA_SLOTS, classes: ['GR86', 'MX-5', 'Clio', 'Mustang FR500S'] }
        ];

        async function seedDatabase() {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML = "Starting batch insert...\n";
            try {
                const batch = db.batch();
                EVENTS_TO_ADD.forEach(ev => {
                    const docRef = db.collection('events').doc(ev.id);
                    batch.set(docRef, ev);
                    logDiv.innerHTML += `Queued: ${ev.name}\n`;
                });
                await batch.commit();
                logDiv.innerHTML += "\nSUCCESS: All missing events seeded to Firestore!";
            } catch (e) {
                console.error(e);
                logDiv.innerHTML += `\nERROR: ${e.message}\nMake sure your security rules allow writes, or you are logged in as admin if rules require it.`;
                
                // If it fails due to permissions, prompt to sign in
                if(e.message.includes("permission-denied")) {
                    logDiv.innerHTML += `\nAttempting anonymous sign-in or use your admin dashboard. Please sign in via the main app then try again.`;
                }
            }
        }
    </script>
</body>
</html>
