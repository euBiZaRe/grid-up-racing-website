<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Grid Up Sim Racing</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-container {
            margin-top: 5rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        .profile-header-alt {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            margin-bottom: 3rem;
        }
        .user-avatar-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            margin-bottom: 1.5rem;
            box-shadow: 0 0 20px rgba(0, 207, 255, 0.3);
        }
        .profile-form {
            display: grid;
            gap: 1.5rem;
            padding: 2rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
        }
        .form-input {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            border-radius: 4px;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 207, 255, 0.2);
        }
        .admin-hanging-btn {
            position: fixed;
            right: 0px;
            top: 50%;
            transform: translateY(-50%) rotate(-90deg);
            transform-origin: bottom right;
            z-index: 9999;
            padding: 0.8rem 2rem;
            background: rgba(0, 0, 0, 0.9) !important;
            backdrop-filter: blur(10px);
            border: 1px solid var(--primary) !important;
            border-bottom: none !important;
            border-radius: 12px 12px 0 0;
            font-weight: 900;
            letter-spacing: 2px;
            font-size: 0.65rem;
            white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.5);
            text-decoration: none;
            color: var(--primary);
            cursor: pointer;
        }
        .admin-hanging-btn:hover {
            padding-bottom: 1.2rem;
            background: var(--primary) !important;
            color: #000 !important;
            box-shadow: 0 -10px 40px rgba(0, 207, 255, 0.4);
        }
    </style>
</head>
<body class="member-profile-page">
    <nav id="navbar" class="scrolled">
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <img src="assets/logo.png" alt="GRID UP" style="height: 40px; vertical-align: middle;">
            </a>
            <div class="nav-links">
                <a href="index.html#home">Home</a>
                <a href="index.html#about">About</a>
                <a href="roster.html">Roster</a>
                <a href="events.html">Events</a>
                <a href="index.html#contact">Contact</a>
                <a href="login.html" id="login-link" class="btn btn-outline" style="padding: 0.5rem 1.25rem; font-size: 0.8rem; margin-left: 1rem;">Login</a>
            </div>
        </div>
    </nav>

    <main class="container profile-container">
        <div id="loading-profile" style="text-align: center; padding: 10rem 0;">
            <p class="glow-text">Loading your profile...</p>
        </div>

        <div id="profile-content" style="display: none;">
            <div class="profile-header-alt glass" style="position: relative;">
                <div style="position: relative; display: inline-block;">
                    <img id="user-avatar" src="" class="user-avatar-large">
                    <button onclick="document.getElementById('avatar-upload').click()" class="btn" style="position: absolute; bottom: 10px; right: 0; padding: 0.4rem; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: var(--primary); color: #000; font-size: 0.8rem; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">📷</button>
                    <input type="file" id="avatar-upload" style="display: none;" accept="image/*" onchange="uploadAvatar(this)">
                </div>
                <h1 id="user-name" class="glow-text">Driver Name</h1>
                <p id="discord-username" style="color: var(--primary); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin-top: 0.5rem; opacity: 0.8;"></p>
                <div id="upload-progress" style="font-size: 0.7rem; color: var(--primary); margin-top: 0.5rem; height: 1rem;"></div>
                <p id="user-status" style="color: var(--text-muted); margin-top: 0.5rem;">Grid Up Community Member</p>
            </div>

            <div class="glass">
                <div class="profile-form">
                    <h2 class="section-title" style="font-size: 1.5rem;">Driver Details</h2>
                    
                    <div class="form-group">
                        <label>Driver Name</label>
                        <input type="text" id="input-name" class="form-input" placeholder="Enter Name">
                    </div>

                    <div class="form-group">
                        <label>iRacing ID</label>
                        <input type="text" id="input-iracing-id" class="form-input" placeholder="Enter your iRacing ID (e.g. 123456)">
                    </div>

                    <div class="form-group">
                        <label>Garage 61 URL</label>
                        <input type="text" id="input-g61-url" class="form-input" placeholder="https://garage61.net/app/drivers/your-name">
                    </div>

                    <div class="form-group">
                        <label>Preferred Class</label>
                        <select id="input-class" class="form-input" style="background: #111;">
                            <option value="GT3">GT3</option>
                            <option value="Formula">Formula</option>
                            <option value="Prototypes">Prototypes</option>
                            <option value="Oval">Oval</option>
                            <option value="Endurance">Endurance</option>
                        </select>
                    </div>

                    <h2 class="section-title" style="font-size: 1.5rem; margin-top: 2rem;">Streaming & Socials</h2>
                    <p style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 1rem;">Link your channels to show up as LIVE on event pages!</p>

                    <div class="form-group">
                        <label>Twitch Channel URL</label>
                        <input type="text" id="input-twitch" class="form-input" placeholder="https://twitch.tv/yourname">
                    </div>

                    <div class="form-group">
                        <label>TikTok Profile URL</label>
                        <input type="text" id="input-tiktok" class="form-input" placeholder="https://tiktok.com/@yourname">
                    </div>

                    <div class="form-group">
                        <label>YouTube Channel URL</label>
                        <input type="text" id="input-youtube" class="form-input" placeholder="https://youtube.com/@yourname">
                    </div>

                    <button onclick="saveProfile()" class="btn btn-primary" style="margin-top: 1rem; width: 100%;">Save Profile Changes</button>
                    
                    <div id="save-status" style="text-align: center; color: var(--primary); font-size: 0.8rem; height: 1rem;"></div>
                </div>
            </div>

            <div id="achievements-section" class="glass" style="margin-top: 2rem; padding: 2.5rem; display: none;">
                <h2 class="section-title" style="font-size: 1.5rem; margin-bottom: 2rem; color: var(--primary);">My Race Trophies</h2>
                <div id="trophy-gallery" class="grid" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem;">
                    <!-- Dynamically populated from Firestore -->
                    <p style="text-align: center; color: var(--text-muted); grid-column: 1/-1;">Loading your achievements...</p>
                </div>
            </div>

            <div id="claim-verification-status" class="glass" style="margin-top: 2rem; padding: 2rem; text-align: center; display: none;">
                <!-- Filled via JS if they have a pending claim -->
            </div>
        </div>
    <!-- Cinematic Card Modal (Expansion Overlay) -->
    <div id="card-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; padding: 2rem; align-items: center; justify-content: center; backdrop-filter: blur(15px); transition: all 0.3s ease;">
        <div style="position: relative; max-width: 1100px; width: 100%; aspect-ratio: 16/9; transform: scale(0.9); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);" id="modal-container">
            <!-- Content will be injected by JavaScript -->
        </div>
        
        <!-- Modal Controls -->
        <div style="position: absolute; top: 2rem; right: 2rem; display: flex; gap: 1rem;">
            <button onclick="downloadActiveCard()" class="btn" style="background: var(--primary); color: #000; font-weight: 900; display: flex; align-items: center; gap: 10px; box-shadow: 0 0 30px rgba(0,207,255,0.3);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                DOWNLOAD HD POSTER
            </button>
            <button onclick="closeCardModal()" class="btn btn-outline" style="border-radius: 50%; width: 50px; height: 50px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2);">&times;</button>
        </div>
    </div>

    <!-- Background Canvas for High-Res Exports -->
    <canvas id="export-canvas" style="display: none;"></canvas>

    <a href="admin.html" id="admin-dashboard-btn" class="admin-hanging-btn" style="display: none;">ACCESS ADMIN PANEL</a>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <script src="js/auth.js"></script>
    <script src="script.js"></script>
    <script>
        // Profile Management Logic
        async function loadUserProfile(user) {
            console.log("Profile: Loading data for", user.uid);
            const content = document.getElementById('profile-content');
            const loading = document.getElementById('loading-profile');
            const avatar = document.getElementById('user-avatar');
            const nameElt = document.getElementById('user-name');
            const discordElt = document.getElementById('discord-username');
            
            avatar.src = user.photoURL || "https://www.gravatar.com/avatar/00000000000000000000000000000000?d=mp&f=y";
            nameElt.textContent = user.displayName || "Grid Up Driver";
            discordElt.textContent = user.displayName ? `@${user.displayName}` : "";
            discordElt.style.display = user.displayName ? 'block' : 'none';

            if (!db) {
                console.error("Profile: Firestore 'db' is NOT INITIALIZED!");
                loading.innerHTML = '<p style="color: #ff0099;">Error: Database connection failed. Please refresh.</p>';
                return;
            }

            // Fetch extra data from Firestore
            try {
                console.log("Profile: Fetching Firestore doc...");
                const doc = await db.collection("users").doc(user.uid).get();
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('input-name').value = data.driverName || "";
                    document.getElementById('input-iracing-id').value = data.iracingId || "";
                    document.getElementById('input-g61-url').value = data.g61Url || "";
                    document.getElementById('input-class').value = data.driverClass || "GT3";
                    
                    // Social Links
                    document.getElementById('input-twitch').value = data.twitchUrl || "";
                    document.getElementById('input-tiktok').value = data.tiktokUrl || "";
                    document.getElementById('input-youtube').value = data.youtubeUrl || "";
                    
                    // Update header if custom data exists
                    if (data.driverName) {
                        nameElt.textContent = data.driverName;
                    }
                    if (data.customAvatarUrl) {
                        avatar.src = data.customAvatarUrl;
                    }
                }
                
                // Check if they are a verified team member
                const claims = await db.collection("claims").where("discordId", "==", user.uid).get();
                const claimStatusDiv = document.getElementById('claim-verification-status');
                if (!claims.empty) {
                    const claimData = claims.docs[0].data();
                    claimStatusDiv.style.display = 'block';
                    if (claimData.status === 'verified') {
                        claimStatusDiv.innerHTML = `<h3 style="color: var(--primary);">✓ YOU ARE A VERIFIED TEAM DRIVER</h3><p style="color: var(--text-muted); font-size: 0.8rem; margin-top:0.5rem;">Linked to: ${claims.docs[0].id}</p>`;
                    } else {
                        claimStatusDiv.innerHTML = `<h3 style="color: #fff;">CLAIM PENDING VERIFICATION</h3><p style="color: var(--text-muted); font-size: 0.8rem; margin-top:0.5rem;">Request for: ${claims.docs[0].id}</p>`;
                    }
                }
                console.log("Profile: Data loaded successfully.");

                // Load Driver Cards
                loadUserCards(user.uid);

            } catch (error) {
                console.error("Profile: Error loading user data:", error);
            }

            loading.style.display = 'none';
            content.style.display = 'block';
        }

        async function saveProfile() {
            const user = firebase.auth().currentUser;
            if (!user) return;

            const status = document.getElementById('save-status');
            status.textContent = "Saving...";

            try {
                await db.collection("users").doc(user.uid).set({
                    discordName: user.displayName, // Preserve Discord name
                    email: user.email,
                    driverName: document.getElementById('input-name').value,
                    iracingId: document.getElementById('input-iracing-id').value,
                    g61Url: document.getElementById('input-g61-url').value,
                    driverClass: document.getElementById('input-class').value,
                    twitchUrl: document.getElementById('input-twitch').value,
                    tiktokUrl: document.getElementById('input-tiktok').value,
                    youtubeUrl: document.getElementById('input-youtube').value,
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                
                status.textContent = "Profile updated successfully!";
                setTimeout(() => { status.textContent = ""; }, 3000);
            } catch (error) {
                console.error("Error saving profile:", error);
                status.textContent = "Error saving changes.";
                status.style.color = "#ff0099";
            }
        }

        async function uploadAvatar(input) {
            const file = input.files[0];
            const user = firebase.auth().currentUser;
            if (!file || !user) return;

            const progress = document.getElementById('upload-progress');
            progress.textContent = "Processing...";

            try {
                // Read and compress image in browser to fit Firestore limits
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const img = new Image();
                    img.onload = async () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 250; // Optimized for Firestore
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_SIZE) {
                                height *= MAX_SIZE / width;
                                width = MAX_SIZE;
                            }
                        } else {
                            if (height > MAX_SIZE) {
                                width *= MAX_SIZE / height;
                                height = MAX_SIZE;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // Get base64 string
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        
                        progress.textContent = "Saving to profile...";
                        await db.collection("users").doc(user.uid).set({
                            customAvatarUrl: dataUrl,
                            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                        }, { merge: true });

                        document.getElementById('user-avatar').src = dataUrl;
                        progress.textContent = "Photo updated!";
                        setTimeout(() => { progress.textContent = ""; }, 3000);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            } catch (error) {
                console.error("Avatar save failed:", error);
                progress.textContent = "Save failed: " + error.message;
                progress.style.color = "#ff0099";
            }
        }

        async function loadUserCards(uid) {
            const gallery = document.getElementById('trophy-gallery');
            const section = document.getElementById('achievements-section');
            if (!gallery || !section) return;

            try {
                // 1. Fetch user's verified identity from claims
                let identity = null;
                const claimSnap = await db.collection("claims").where("discordId", "==", uid).get();
                if (!claimSnap.empty) {
                    const claimData = claimSnap.docs[0].data();
                    if (claimData.status === 'verified') {
                        identity = claimData.driverIdentity || claimData.discordName;
                    }
                }

                // 2. Query results where this user was a driver (Parallel lookups)
                const queries = [
                    db.collection("race_results").where("uids", "array-contains", uid).get()
                ];
                
                if (identity) {
                    queries.push(db.collection("race_results").where("drivers", "array-contains", identity).get());
                }

                const results = await Promise.all(queries);
                
                // 3. Merge results by Doc ID
                const allDocs = new Map();
                results.forEach(snap => {
                    snap.forEach(doc => allDocs.set(doc.id, doc.data()));
                });

                if (allDocs.size === 0) {
                    section.style.display = 'none';
                    return;
                }

                const profileName = document.getElementById('user-name').textContent.trim();

                section.style.display = 'block';
                gallery.innerHTML = '';
                allDocs.forEach((d) => {
                    
                    // Personalize: Highlight self in the driver list
                    const driverList = d.drivers.map(name => {
                        if (name.toLowerCase() === profileName.toLowerCase()) {
                            return `<span style="color: var(--primary); font-weight: 900;">${name.toUpperCase()}</span>`;
                        }
                        return name.toUpperCase();
                    }).join(' - ');

                    const card = document.createElement('div');
                    card.className = 'card cinematic-poster animate-fade-in';
                    card.style.padding = '0';
                    card.style.overflow = 'hidden';
                    card.style.position = 'relative';
                    card.style.background = '#000';
                    card.style.aspectRatio = '16/9';
                    card.style.borderRadius = '12px';
                    card.style.boxShadow = '0 10px 30px rgba(0,0,0,0.5)';
                    card.style.cursor = 'pointer';
                    card.style.transition = 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';

                    card.onclick = () => openCardModal(d);

                    card.innerHTML = `
                        <img src="${d.rawUrl}" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: transform 0.8s;">
                        <div style="position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 40%, rgba(0,0,0,0.4) 100%);"></div>
                        
                        <!-- Top Left: Event Type/Track -->
                        <div style="position: absolute; top: 0.75rem; left: 1rem; text-align: left;">
                            <div style="font-size: 0.5rem; color: var(--primary); font-weight: 900; letter-spacing: 2px; text-transform: uppercase;">SPECIAL EVENTS</div>
                            <div style="font-size: 1.1rem; font-weight: 900; color: white; line-height: 1; margin-top: 0.2rem;">${(d.trackName || d.eventName).toUpperCase()}</div>
                        </div>

                        <!-- Top Right: Car & Position -->
                        <div style="position: absolute; top: 0.75rem; right: 1rem; text-align: right;">
                            <div style="font-size: 0.6rem; color: white; font-weight: 700; opacity: 0.9;">Car: ${d.carUsed || 'TBD'}</div>
                            <div style="font-size: 0.65rem; color: white; margin-top: 0.2rem;">Start: ${d.startPos || '?'}</div>
                            <div style="font-size: 1rem; color: white; font-weight: 900; margin-top: 0.1rem;">Finish: ${d.position}</div>
                        </div>

                        <!-- Bottom: Drivers and Team Logo -->
                        <div style="position: absolute; bottom: 1rem; left: 0; width: 100%; padding: 0 1rem; display: flex; justify-content: space-between; align-items: flex-end;">
                            <div style="text-align: left; max-width: 80%;">
                                <div style="font-size: 0.6rem; color: rgba(255,255,255,0.7); margin-bottom: 0.2rem;">${d.raceDate || ''}</div>
                                <div style="font-size: 0.7rem; font-weight: 800; color: white; letter-spacing: 1px; line-height: 1.2;">${driverList}</div>
                            </div>
                            <div style="background: rgba(255,255,255,0.05); padding: 0.35rem; border-radius: 4px;">
                                <img src="assets/Grid Up Sim Endurance.png" style="height: 20px; object-fit: contain;" onerror="this.style.display='none'">
                            </div>
                        </div>

                        <!-- Interaction Overlay -->
                        <div style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,207,255,0.1); opacity: 0; transition: opacity 0.3s;" class="hover-overlay">
                             <div style="padding: 0.75rem 1.5rem; border: 2px solid var(--primary); color: var(--primary); font-weight: 800; font-size: 0.8rem; letter-spacing: 2px; border-radius: 4px;">EXPAND</div>
                        </div>
                    `;
                    
                    card.onmouseenter = () => {
                        card.style.transform = 'scale(1.05) translateY(-5px)';
                        card.querySelector('img').style.transform = 'scale(1.1)';
                        card.querySelector('.hover-overlay').style.opacity = '1';
                    };
                    card.onmouseleave = () => {
                        card.style.transform = 'scale(1) translateY(0)';
                        card.querySelector('img').style.transform = 'scale(1)';
                        card.querySelector('.hover-overlay').style.opacity = '0';
                    };

                    gallery.appendChild(card);
                });
            } catch (e) {
                console.error("Error loading user cards:", e);
                gallery.innerHTML = '<p style="color: #ff0055;">Failed to load results.</p>';
            }
        }


        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                loadUserProfile(user);
            } else {
                window.location.href = "login.html";
            }
        });
    </script>
</body>
</html>
