<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Portal | Grid Up Sim Racing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="member-portal-page">
    <nav id="navbar" class="scrolled">
        <div class="container nav-content">
            <a href="index.html" class="logo">GRID UP</a>
            <div class="nav-links">
                <a href="index.html#home">Home</a>
                <a href="roster.html">Roster</a>
                <a href="events.html">Events</a>
                <div id="login-link"></div>
            </div>
        </div>
    </nav>

    <main class="container portal-container">
        <div id="loading-portal" style="text-align: center; padding: 10rem 0;">
            <p class="glow-text">Accessing Team Portal...</p>
        </div>

        <!-- Selection View -->
        <div id="selection-view" style="display: none;">
            <h1 class="glow-text" style="margin-bottom: 2rem;">Select Your Event</h1>
            <div id="event-selection-grid" class="grid">
                <!-- Populated via JS -->
            </div>
        </div>

        <!-- Portal View -->
        <div id="portal-view" style="display: none;">
            <div class="portal-welcome">
                <a href="portal.html" class="back-btn" style="margin-bottom: 1rem;">← Switch Event</a>
                <h1 id="event-title" class="glow-text">Event Name</h1>
                <p id="team-title" style="color: var(--primary); font-size: 1.2rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;">Team Name</p>
            </div>

            <div class="portal-tabs">
                <div class="portal-tab active" onclick="switchTab('wall')">Communications</div>
                <div class="portal-tab" onclick="switchTab('setups')">Setups</div>
                <div class="portal-tab" onclick="switchTab('telemetry')">Garage 61</div>
            </div>

            <div class="portal-grid">
                <!-- Main Content -->
                <div class="portal-main-content">
                    
                    <!-- Wall Tab -->
                    <div id="tab-wall" class="tab-content glass chat-wall">
                        <div id="chat-messages" class="chat-messages">
                            <!-- Messages go here -->
                        </div>
                        <div class="chat-input-area">
                            <input type="text" id="chat-input" class="chat-input" placeholder="Type a message for the team...">
                            <button onclick="sendMessage()" class="btn btn-primary">Send</button>
                        </div>
                    </div>

                    <!-- Setups Tab -->
                    <div id="tab-setups" class="tab-content glass" style="display: none; padding: 2rem;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                            <h2 style="font-size: 1.2rem;">Setup Repository</h2>
                            <label class="btn btn-outline" style="font-size: 0.8rem; cursor: pointer;">
                                Upload Setup (.sto)
                                <input type="file" id="setup-upload" style="display: none;" onchange="uploadSetup(this)">
                            </label>
                        </div>
                        <div id="setup-list" class="setup-list">
                            <!-- Setups go here -->
                        </div>
                    </div>

                    <!-- Telemetry Tab -->
                    <div id="tab-telemetry" class="tab-content glass" style="display: none; padding: 2rem;">
                        <h2 style="font-size: 1.2rem; margin-bottom: 1.5rem;">Team Lap Data</h2>
                        <div id="g61-member-list" class="g61-list">
                            <!-- Member G61 links go here -->
                        </div>
                        <div id="g61-team-link" style="margin-top: 2rem; padding: 1.5rem; background: rgba(0,207,255,0.05); border-radius: 8px; border: 1px dashed var(--primary); text-align: center;">
                            <!-- Event G61 link if available -->
                        </div>
                    </div>

                </div>

                <!-- Sidebar -->
                <div class="portal-sidebar">
                    <div class="glass" style="padding: 1.5rem;">
                        <h3 style="font-size: 0.9rem; margin-bottom: 1rem; color: var(--primary);">Confirmed Lineup</h3>
                        <div id="lineup-list" style="font-size: 0.9rem;">
                            <!-- Sidebar lineup -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Access Denied View -->
        <div id="denied-view" style="display: none; text-align: center; padding: 5rem 0;">
            <h1 style="color: #ff0055;">Access Denied</h1>
            <p id="denied-reason" style="margin: 1.5rem 0; color: var(--text-muted);"></p>
            <a href="index.html" class="btn btn-outline">Return Home</a>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let currentEvent = null;
        let currentTeam = null;
        let userProfile = null;
        let unsubMessages = null;
        let isAdminUser = false;

        const UPCOMING_EVENTS = [
            { id: 'daytona-24', name: 'Daytona 24', date: 'January 16-18', slots: ['Slot 1: Fri 22:00 GMT', 'Slot 2: Sat 7:00 GMT'] },
            { id: 'bathurst-12', name: 'Bathurst 12', date: 'February 20-22', slots: ['Slot 1: Fri 22:00 GMT', 'Slot 2: Sat 7:00 GMT', 'Slot 3: Sat 12:00 GMT'] },
            { id: 'sebring-12h', name: 'Sebring 12HR', date: 'March 27-29', slots: ['Slot 1: Fri 22:00 GMT', 'Slot 2: Sat 7:00 GMT'] },
            { id: 'imsa-classic-500', name: 'IMSA Classic 500', date: 'April 10-11', slots: ['Slot 1: Fri 22:00 GMT', 'Slot 2: Sat 7:00 GMT'] },
            { id: 'nurburgring-24h', name: 'Nürburgring 24h', date: 'May 1-3' },
            { id: 'indy-500', name: 'INDY 500', date: 'May 5-18' },
            { id: 'world-600', name: 'World 600', date: 'May 20-25' },
            { id: 'thruxton-4h', name: '4 Hours at Thruxton', date: 'May 29-31' },
            { id: 'watkins-glen-6h', name: 'Watkins Glen 6 Hour', date: 'June 19-21' },
            { id: 'firecracker-400', name: 'Firecracker 400', date: 'June 30 - July 6' },
            { id: 'spa-24hr', name: 'Spa 24hr', date: 'July 10-12' },
            { id: 'brickyard-400', name: 'Brickyard 400', date: 'July 22-27' },
            { id: 'road-america-6h', name: 'Road America 6h', date: 'July 24-26' },
            { id: 'suzuka-1000km', name: 'Suzuka 1000km', date: 'Sept 10-15' },
            { id: 'petit-le-mans', name: 'Petit Le Mans', date: 'Sept 25-27' },
            { id: 'bathurst-1000', name: 'Bathurst 1000', date: 'Oct 2-4' },
            { id: 'indy-8h', name: 'Indy 8h', date: 'Oct 16-18' }
        ];

        async function initPortal(user) {
            const loading = document.getElementById('loading-portal');
            const selection = document.getElementById('selection-view');
            const portal = document.getElementById('portal-view');
            const denied = document.getElementById('denied-view');
            const deniedReason = document.getElementById('denied-reason');

            try {
                // 1. Check Admin Status
                const MASTER_ADMIN = 'B0t4f4nqqpZIQKpT8Ed97xka5gM2';
                isAdminUser = (user.uid === MASTER_ADMIN);
                
                if (!isAdminUser) {
                    const adminDoc = await db.collection("settings").doc("admins").get();
                    if (adminDoc.exists) {
                        const adminList = adminDoc.data().uids || [];
                        isAdminUser = adminList.includes(user.uid);
                    }
                }

                // 2. Check Verification (Skip for Admins)
                if (!isAdminUser) {
                    const claimDoc = await db.collection("claims").where("discordId", "==", user.uid).get();
                    if (claimDoc.empty || claimDoc.docs[0].data().status !== 'verified') {
                        loading.style.display = 'none';
                        denied.style.display = 'block';
                        deniedReason.textContent = "You must be a verified team member to access the portal. Please claim your profile on the Roster page.";
                        return;
                    }
                }

                // 3. Load User Profile
                const userDoc = await db.collection("users").doc(user.uid).get();
                userProfile = userDoc.exists ? userDoc.data() : { driverName: user.displayName };
                const myName = userProfile.driverName || user.displayName;

                // 4. Find Teams
                const lineups = await db.collection("race_lineups").get();
                const myTeams = [];
                const allTeamAssignments = [];

                lineups.forEach(doc => {
                    const data = doc.data();
                    const slug = doc.id;
                    if (data.teams) {
                        data.teams.forEach(team => {
                            const teamObj = {
                                eventSlug: slug,
                                eventName: data.eventName || slug.split('-').map(s => s.charAt(0).toUpperCase() + s.slice(1)).join(' '),
                                teamName: team.name,
                                teamData: team
                            };
                            allTeamAssignments.push(teamObj);
                            
                            const isCaptain = team.captain === myName;
                            const isDriver = team.drivers && team.drivers.includes(myName);
                            if (isCaptain || isDriver) {
                                myTeams.push(teamObj);
                            }
                        });
                    }
                });

                loading.style.display = 'none';

                if (isAdminUser) {
                    showSelection(allTeamAssignments, true);
                } else if (myTeams.length === 0) {
                    showSelection([], false); // Still show sign-ups
                } else if (myTeams.length === 1 && !window.location.hash) {
                    loadTeamPortal(myTeams[0]);
                } else {
                    showSelection(myTeams, false);
                }

            } catch (error) {
                console.error("Portal Init Error:", error);
                loading.innerHTML = `<p style="color: #ff0055;">Error: ${error.message}</p>`;
            }
        }

        async function showSelection(teams, isAdmin) {
            const container = document.getElementById('selection-view');
            const grid = document.getElementById('event-selection-grid');
            
            let html = `
                <div style="margin-bottom: 4rem;">
                    <h2 class="section-title">${isAdminUser ? 'Admin: All Event Lineups' : 'Your Assigned Events'}</h2>
                    <div class="grid">`;
            
            if (teams.length === 0) {
                html += `<p style="color: var(--text-muted); grid-column: 1/-1; text-align: center; padding: 2rem;">No active team assignments found.</p>`;
            } else {
                teams.forEach(t => {
                    html += `
                        <div class="card glass" onclick='loadTeamPortal(${JSON.stringify(t)})' style="cursor: pointer;">
                            <div class="event-meta">${t.teamName}</div>
                            <h3>${t.eventName}</h3>
                            <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 1rem;">Click to Enter Portal</p>
                        </div>
                    `;
                });
            }

            html += `</div></div>`;

            // Availability Section
            html += `
                <div style="margin-bottom: 4rem;">
                    <h2 class="section-title">Upcoming Event Sign-ups</h2>
                    <div id="availability-grid" class="grid">
                        <p>Loading availability...</p>
                    </div>
                </div>
            `;

            // Admin Results Section
            if (isAdminUser) {
                html += `
                    <div style="margin-bottom: 4rem;">
                        <h2 class="section-title">Admin Dashboard: Driver Accessibility</h2>
                        <div id="admin-availability-results" class="glass" style="padding: 2rem; overflow-x: auto;">
                            <p>Loading summary...</p>
                        </div>
                    </div>
                `;
            }

            container.innerHTML = `<h1 class="glow-text" style="margin-bottom: 3rem;">Team Portal Dashboard</h1>` + html;
            container.style.display = 'block';

            // Populate Availability Buttons
            populateAvailability();

            if (isAdminUser) {
                loadAdminAvailability();
            }
        }

        async function populateAvailability() {
            const availGrid = document.getElementById('availability-grid');
            if (!availGrid) return;
            
            // Initial load or rebuild? Check if cards exist
            const hasCards = availGrid.querySelectorAll('.event-card').length === UPCOMING_EVENTS.length;
            
            for (const event of UPCOMING_EVENTS) {
                let card = availGrid.querySelector(`[data-event-id="${event.id}"]`);
                
                // Fetch current status
                let currentStatus = null;
                let preferredSlot = null;
                try {
                    const statusDoc = await db.collection("event_availability").doc(event.id).collection("responses").doc(auth.currentUser.uid).get();
                    if (statusDoc.exists) {
                        currentStatus = statusDoc.data().status;
                        preferredSlot = statusDoc.data().preferredSlot;
                    }
                } catch (e) { console.warn("Could not fetch status for", event.id); }

                if (!card) {
                    card = document.createElement('div');
                    card.className = "card glass event-card";
                    card.setAttribute('data-event-id', event.id);
                    card.style.padding = "1.5rem";
                    availGrid.appendChild(card);
                }

                // Update content only if needed (or always if we want precise states)
                let slotsHtml = '';
                if (event.slots && currentStatus === 'signed_up') {
                    slotsHtml = `
                        <div style="margin-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
                            <label style="font-size: 0.6rem; color: var(--primary); display:block; margin-bottom: 0.5rem; text-transform: uppercase;">Timeslot Preference</label>
                            <select onchange="updatePreference('${event.id}', this.value)" class="btn btn-outline" style="width: 100%; font-size: 0.7rem; padding: 0.4rem; background: rgba(0,0,0,0.3);">
                                <option value="">-- Select Preference --</option>
                                ${event.slots.map(s => `<option value="${s}" ${preferredSlot === s ? 'selected' : ''}>${s}</option>`).join('')}
                            </select>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="event-meta">${event.date}</div>
                    <h3 style="font-size: 1rem;">${event.name}</h3>
                    <div style="display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1.5rem;">
                        <button onclick="setAvailability('${event.id}', 'signed_up')" class="btn ${currentStatus === 'signed_up' ? 'btn-primary' : 'btn-outline'}" style="padding: 0.5rem; font-size: 0.7rem;">Sign Up</button>
                        <button onclick="setAvailability('${event.id}', 'not_interested')" class="btn ${currentStatus === 'not_interested' ? 'btn-primary' : 'btn-outline'}" style="padding: 0.5rem; font-size: 0.7rem; background: ${currentStatus === 'not_interested' ? '#444' : ''};">Not Interested</button>
                        <button onclick="setAvailability('${event.id}', 'unavailable')" class="btn ${currentStatus === 'unavailable' ? 'btn-primary' : 'btn-outline'}" style="padding: 0.5rem; font-size: 0.7rem; background: ${currentStatus === 'unavailable' ? '#600' : ''};">Not Available</button>
                    </div>
                    ${slotsHtml}
                `;
            }
        }

        async function updatePreference(eventId, slot) {
            try {
                await db.collection("event_availability").doc(eventId).collection("responses").doc(auth.currentUser.uid).update({
                    preferredSlot: slot
                });
                if (isAdminUser) loadAdminAvailability();
            } catch (error) {
                console.error("Error updating preference:", error);
            }
        }

        async function setAvailability(eventId, status) {
            try {
                const docRef = db.collection("event_availability").doc(eventId).collection("responses").doc(auth.currentUser.uid);
                const currentDoc = await docRef.get();
                const currentStatus = currentDoc.exists ? currentDoc.data().status : null;

                if (currentStatus === status) {
                    await docRef.delete();
                } else {
                    const myName = userProfile.driverName || auth.currentUser.displayName;
                    await docRef.set({
                        status: status,
                        driverName: myName,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }

                // Refresh only the logic states, but keep DOM stable
                populateAvailability();
                if (isAdminUser) loadAdminAvailability();
            } catch (error) {
                console.error("Error updating availability:", error);
                alert("Error: " + error.message);
            }
        }

        async function loadAdminAvailability() {
            const resultsDiv = document.getElementById('admin-availability-results');
            if (!resultsDiv) return;

            try {
                let html = `
                    <table style="width: 100%; border-collapse: collapse; font-size: 0.8rem; text-align: left;">
                        <thead>
                            <tr style="border-bottom: 1px solid var(--glass-border);">
                                <th style="padding: 1rem;">Driver</th>
                                ${UPCOMING_EVENTS.map(e => `<th style="padding: 1rem; white-space: nowrap;">${e.name.split(' ').slice(0,2).join(' ')}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody>
                `;

                // Fetch all unique drivers who have responded
                const allDrivers = {}; // uid -> name
                const allResponses = {}; // eventId -> { uid -> status }

                for (const event of UPCOMING_EVENTS) {
                    const snap = await db.collection("event_availability").doc(event.id).collection("responses").get();
                    allResponses[event.id] = {};
                    snap.forEach(doc => {
                        const data = doc.data();
                        allDrivers[doc.id] = data.driverName;
                        allResponses[event.id][doc.id] = data.status;
                    });
                }

                const driverUids = Object.keys(allDrivers).sort((a,b) => allDrivers[a].localeCompare(allDrivers[b]));

                if (driverUids.length === 0) {
                    html += `<tr><td colspan="${UPCOMING_EVENTS.length + 1}" style="padding: 2rem; text-align: center; color: var(--text-muted);">No responses received yet.</td></tr>`;
                } else {
                    driverUids.forEach(uid => {
                        html += `<tr style="border-bottom: 1px solid rgba(255,255,255,0.03);">
                            <td style="padding: 0.8rem; font-weight: 700; color: var(--primary);">${allDrivers[uid]}</td>
                        `;
                        UPCOMING_EVENTS.forEach(event => {
                            const status = allResponses[event.id][uid];
                            let statusHtml = "–";
                            if (status === 'signed_up') statusHtml = `<span style="color: #00ff88;">YES</span>`;
                            if (status === 'not_interested') statusHtml = `<span style="color: #888;">N/I</span>`;
                            if (status === 'unavailable') statusHtml = `<span style="color: #ff0055;">N/A</span>`;
                            html += `<td style="padding: 0.8rem; text-align: center;">${statusHtml}</td>`;
                        });
                        html += `</tr>`;
                    });
                }

                html += `</tbody></table>`;
                resultsDiv.innerHTML = html;

            } catch (error) {
                console.error("Error loading admin availability:", error);
                resultsDiv.innerHTML = `<p style="color: #ff0055;">Error loading results.</p>`;
            }
        }

        // Auth Listener
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                initPortal(user);
            } else {
                window.location.href = "login.html";
            }
        });

        // Enter key for chat
        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
