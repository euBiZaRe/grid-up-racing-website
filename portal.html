<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Portal | Grid Up Sim Racing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="member-portal-page">
    <nav id="navbar" class="scrolled">
        <div class="container nav-content">
            <a href="index.html" class="logo">GRID UP</a>
            <div class="nav-links">
                <a href="index.html#home">Home</a>
                <a href="roster.html">Roster</a>
                <a href="events.html">Events</a>
                <div id="login-link"></div>
            </div>
        </div>
    </nav>

    <main class="container portal-container">
        <div id="loading-portal" style="text-align: center; padding: 10rem 0;">
            <p class="glow-text">Accessing Team Portal...</p>
        </div>

        <!-- Selection View -->
        <div id="selection-view" style="display: none;">
            <h1 class="glow-text" style="margin-bottom: 2rem;">Select Your Event</h1>
            <div id="event-selection-grid" class="grid">
                <!-- Populated via JS -->
            </div>
        </div>

        <!-- Portal View -->
        <div id="portal-view" style="display: none;">
            <div class="portal-welcome">
                <a href="portal.html" class="back-btn" style="margin-bottom: 1rem;">← Switch Event</a>
                <h1 id="event-title" class="glow-text">Event Name</h1>
                <p id="team-title" style="color: var(--primary); font-size: 1.2rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;">Team Name</p>
            </div>

            <div class="portal-tabs">
                <div class="portal-tab active" onclick="switchTab('wall')">Communications</div>
                <div class="portal-tab" onclick="switchTab('setups')">Setups</div>
                <div class="portal-tab" onclick="switchTab('telemetry')">Garage 61</div>
            </div>

            <div class="portal-grid">
                <!-- Main Content -->
                <div class="portal-main-content">
                    
                    <!-- Wall Tab -->
                    <div id="tab-wall" class="tab-content glass chat-wall">
                        <div id="chat-messages" class="chat-messages">
                            <!-- Messages go here -->
                        </div>
                        <div class="chat-input-area">
                            <input type="text" id="chat-input" class="chat-input" placeholder="Type a message for the team...">
                            <button onclick="sendMessage()" class="btn btn-primary">Send</button>
                        </div>
                    </div>

                    <!-- Setups Tab -->
                    <div id="tab-setups" class="tab-content glass" style="display: none; padding: 2rem;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                            <h2 style="font-size: 1.2rem;">Setup Repository</h2>
                            <label class="btn btn-outline" style="font-size: 0.8rem; cursor: pointer;">
                                Upload Setup (.sto or .zip)
                                <input type="file" id="setup-upload" style="display: none;" accept=".sto,.zip" onchange="uploadSetup(this)">
                            </label>
                        </div>
                        <div id="setup-list" class="setup-list">
                            <!-- Setups go here -->
                        </div>
                    </div>

                    <div id="tab-telemetry" class="tab-content glass" style="display: none; padding: 2rem;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
                            <h2 style="font-size: 1.2rem;">Event Fastest Laps</h2>
                            
                            <div style="display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;">
                                <!-- iRating Filter -->
                                <div style="display: flex; align-items: center; gap: 0.8rem; background: rgba(255,255,255,0.03); padding: 0.4rem 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);">
                                    <label style="font-size: 0.7rem; color: var(--primary); text-transform: uppercase; font-weight: 700;">Your iRating</label>
                                    <input type="range" id="irating-slider" min="0" max="10000" step="100" value="2000" style="width: 120px; accent-color: var(--primary);" oninput="updateIRating(this.value)">
                                    <input type="number" id="irating-input" value="2000" min="0" max="10000" step="100" class="btn btn-outline" style="width: 70px; font-size: 0.8rem; padding: 0.2rem 0.5rem; text-align: center;" onchange="updateIRating(this.value)">
                                </div>

                                <select id="class-filter" class="btn btn-outline" style="font-size: 0.8rem; padding: 0.4rem 1rem;" onchange="loadTelemetry()">
                                    <option value="ALL">All Classes</option>
                                </select>
                            </div>
                        </div>
                        <div id="telemetry-leaderboard" style="overflow-x: auto;">
                            <!-- Table goes here -->
                        </div>
                    </div>

                </div>

                <!-- Sidebar -->
                <div class="portal-sidebar">
                    <div class="glass" style="padding: 1.5rem;">
                        <h3 style="font-size: 0.9rem; margin-bottom: 1rem; color: var(--primary);">Confirmed Lineup</h3>
                        <div id="lineup-list" style="font-size: 0.9rem;">
                            <!-- Sidebar lineup -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Access Denied View -->
        <div id="denied-view" style="display: none; text-align: center; padding: 5rem 0;">
            <h1 style="color: #ff0055;">Access Denied</h1>
            <p id="denied-reason" style="margin: 1.5rem 0; color: var(--text-muted);"></p>
            <a href="index.html" class="btn btn-outline">Return Home</a>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let currentEvent = null;
        let currentTeam = null;
        let userProfile = null;
        let unsubMessages = null;
        let isAdminUser = false;

        const IMSA_SLOTS = [
            '#1: Friday 22:00 GMT (6:00PM EDT)', 
            '#2: Saturday 7:00 GMT (3:00AM EDT)', 
            '#3: Saturday 12:00 GMT (8:00AM EDT)', 
            '#4: Saturday 16:00 GMT (12:00PM EDT)'
        ];

        const UPCOMING_EVENTS = [
            { id: 'imsa-classic-500', name: 'IMSA Classic 500', date: 'April 10-11', startDate: '2026-04-10T22:00:00Z', slots: IMSA_SLOTS, classes: ['GTP', 'LMP2', 'GT3'] },
            { id: 'nurburgring-24h', name: 'Nürburgring 24h', date: 'May 1-3', startDate: '2026-05-01T22:00:00Z', slots: IMSA_SLOTS, classes: ['GT3', 'GT4', 'TCR', 'PC'] },
            { id: 'indy-500', name: 'INDY 500', date: 'May 5-18', startDate: '2026-05-05T18:00:00Z', slots: IMSA_SLOTS, classes: ['IndyCar'] },
            { id: 'world-600', name: 'World 600', date: 'May 20-25', startDate: '2026-05-20T22:00:00Z', slots: IMSA_SLOTS, classes: ['NASCAR Next Gen'] },
            { id: 'thruxton-4h', name: '4 Hours at Thruxton', date: 'May 29-31', startDate: '2026-05-29T22:00:00Z', slots: IMSA_SLOTS, classes: ['GT3', 'LMP3'] },
            { id: 'watkins-glen-6h', name: 'Watkins Glen 6 Hour', date: 'June 19-21', startDate: '2026-06-19T22:00:00Z', slots: IMSA_SLOTS, classes: ['GTP', 'LMP2', 'GT3'] },
            { id: 'firecracker-400', name: 'Firecracker 400', date: 'June 30 - July 6', startDate: '2026-06-30T22:00:00Z', slots: IMSA_SLOTS, classes: ['NASCAR Next Gen'] },
            { id: 'spa-24hr', name: 'Spa 24hr', date: 'July 10-12', startDate: '2026-07-10T22:00:00Z', slots: IMSA_SLOTS, classes: ['GT3'] },
            { id: 'brickyard-400', name: 'Brickyard 400', date: 'July 22-27', startDate: '2026-07-22T22:00:00Z', slots: IMSA_SLOTS, classes: ['NASCAR Next Gen'] },
            { id: 'road-america-6h', name: 'Road America 6h', date: 'July 24-26', startDate: '2026-07-24T22:00:00Z', slots: IMSA_SLOTS, classes: ['GTP', 'LMP2', 'GT3'] },
            { id: 'suzuka-1000km', name: 'Suzuka 1000km', date: 'Sept 10-15', startDate: '2026-09-10T22:00:00Z', slots: IMSA_SLOTS, classes: ['GT3'] },
            { id: 'petit-le-mans', name: 'Petit Le Mans', date: 'Sept 25-27', startDate: '2026-09-25T22:00:00Z', slots: IMSA_SLOTS, classes: ['GTP', 'LMP2', 'GT3'] },
            { id: 'bathurst-1000', name: 'Bathurst 1000', date: 'Oct 2-4', startDate: '2026-10-02T22:00:00Z', slots: IMSA_SLOTS, classes: ['V8 Supercar'] },
            { id: 'indy-8h', name: 'Indy 8h', date: 'Oct 16-18', startDate: '2026-10-16T22:00:00Z', slots: IMSA_SLOTS, classes: ['GT3'] }
        ];

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.portal-tab').forEach(t => t.classList.remove('active'));
            
            const content = document.getElementById(`tab-${tabId}`);
            if (content) content.style.display = tabId === 'wall' ? 'flex' : 'block';
            
            const tabBtn = document.querySelector(`.portal-tab[onclick*="${tabId}"]`);
            if (tabBtn) tabBtn.classList.add('active');

            if (tabId === 'setups') loadSetups();
            if (tabId === 'telemetry') loadTelemetry();
        }

        async function loadTeamPortal(team) {
            currentEvent = team.eventSlug;
            currentTeam = team.teamName;
            
            document.getElementById('selection-view').style.display = 'none';
            document.getElementById('portal-view').style.display = 'block';
            
            document.getElementById('event-title').textContent = team.eventName;
            document.getElementById('team-title').textContent = team.teamName;
            
            loadLineup(team.teamData);
            loadMessages();
            switchTab('wall');
        }

        function loadLineup(data) {
            const list = document.getElementById('lineup-list');
            if (!list || !data) return;
            
            let html = `
                <div style="margin-bottom: 1rem;">
                    <div style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Car</div>
                    <div style="font-weight: 700;">${data.car_class || 'Not Set'}</div>
                </div>
                <div style="margin-bottom: 1rem;">
                    <div style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Captain</div>
                    <div style="font-weight: 700; color: var(--primary);">${data.captain || 'None'}</div>
                </div>
                <div>
                    <div style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.5rem;">Drivers</div>
                    ${data.drivers ? data.drivers.map(d => `<div style="padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05);">${d}</div>`).join('') : '<div style="color: var(--text-muted);">No drivers assigned</div>'}
                </div>
            `;
            list.innerHTML = html;
        }

        async function loadMessages() {
            if (unsubMessages) unsubMessages();
            
            const container = document.getElementById('chat-messages');
            unsubMessages = db.collection("race_lineups").doc(currentEvent)
                .collection("teams").doc(currentTeam)
                .collection("messages")
                .orderBy("timestamp", "asc")
                .onSnapshot(snap => {
                    container.innerHTML = '';
                    snap.forEach(doc => {
                        const m = doc.data();
                        const time = m.timestamp ? m.timestamp.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '...';
                        container.innerHTML += `
                            <div class="message ${m.uid === auth.currentUser.uid ? 'sent' : 'received'}">
                                <div class="msg-author">${m.author}</div>
                                <div class="msg-text">${m.text}</div>
                                <div class="msg-time">${time}</div>
                            </div>
                        `;
                    });
                    container.scrollTop = container.scrollHeight;
                });
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || !currentEvent || !currentTeam) return;
            
            input.value = '';
            try {
                await db.collection("race_lineups").doc(currentEvent)
                    .collection("teams").doc(currentTeam)
                    .collection("messages").add({
                        author: userProfile.driverName || auth.currentUser.displayName,
                        uid: auth.currentUser.uid,
                        text: text,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
            } catch (error) {
                console.error("Error sending message:", error);
                alert("Could not send message.");
            }
        }

        async function loadSetups() {
            const list = document.getElementById('setup-list');
            list.innerHTML = '<p style="text-align: center; color: var(--text-muted);">Loading setups...</p>';
            
            try {
                const snap = await db.collection("race_lineups").doc(currentEvent)
                    .collection("teams").doc(currentTeam)
                    .collection("setups").get();
                
                list.innerHTML = '';
                if (snap.empty) {
                    list.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 2rem;">No setups uploaded yet.</p>';
                    return;
                }
                
                snap.forEach(doc => {
                    const s = doc.data();
                    list.innerHTML += `
                        <div class="setup-item" style="display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <div>
                                <div style="font-weight: 700;">${s.name}</div>
                                <div style="font-size: 0.7rem; color: var(--text-muted);">Uploaded by ${s.author}</div>
                            </div>
                            <button onclick="downloadSetup('${s.url}', '${s.name}')" class="btn btn-primary" style="padding: 0.3rem 1rem; font-size: 0.7rem;">Download</button>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Error loading setups:", error);
            }
        }

        function downloadSetup(url, name) {
            const link = document.createElement('a');
            link.href = url;
            link.download = name;
            link.target = "_blank";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        async function uploadSetup(input) {
            const file = input.files[0];
            if (!file || !currentEvent || !currentTeam) return;
            
            if (!file.name.endsWith('.sto') && !file.name.endsWith('.zip')) {
                alert("Please upload an iRacing .sto setup or a .zip archive.");
                return;
            }

            const storageRef = firebase.storage().ref(`setups/${currentEvent}/${currentTeam}/${file.name}`);
            try {
                const snapshot = await storageRef.put(file);
                const url = await snapshot.ref.getDownloadURL();
                
                await db.collection("race_lineups").doc(currentEvent)
                    .collection("teams").doc(currentTeam)
                    .collection("setups").add({
                        name: file.name,
                        url: url,
                        author: userProfile.driverName || auth.currentUser.displayName,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                
                alert("Setup uploaded successfully!");
                loadSetups();
            } catch (error) {
                console.error("Upload error:", error);
                alert("Upload failed: " + error.message);
            }
        }

        let currentIRating = 2000;
        function updateIRating(val) {
            currentIRating = parseInt(val);
            document.getElementById('irating-slider').value = currentIRating;
            document.getElementById('irating-input').value = currentIRating;
            loadTelemetry();
        }

        async function loadTelemetry() {
            const container = document.getElementById('telemetry-leaderboard');
            const classFilter = document.getElementById('class-filter');
            const event = UPCOMING_EVENTS.find(e => e.id === currentEvent);
            
            if (!event) return;

            if (classFilter.options.length === 1 && event.classes) {
                event.classes.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c;
                    opt.textContent = c;
                    classFilter.appendChild(opt);
                });
            }

            container.innerHTML = '<p style="text-align: center; color: var(--text-muted);">Loading lap data...</p>';
            
            try {
                let query = db.collection("race_laps").doc(currentEvent).collection("laps").orderBy("lapTime", "asc");
                const selectedClass = classFilter.value;
                if (selectedClass !== 'ALL') {
                    query = query.where("carClass", "==", selectedClass);
                }

                const snap = await query.get();
                if (snap.empty) {
                    container.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 2rem;">No data recorded yet for this event.</p>';
                    return;
                }

                // DATA PROCESSING & FILTERING
                const allLaps = [];
                snap.forEach(doc => allLaps.push({id: doc.id, ...doc.data()}));

                const g61Laps = allLaps.filter(l => l.source !== 'iRacingData');
                const irdLaps = allLaps.filter(l => l.source === 'iRacingData');
                const filteredIRDLaps = [];
                const cars = [...new Set(irdLaps.map(l => l.car))];
                
                cars.forEach(car => {
                    const carOptions = irdLaps.filter(l => l.car === car);
                    let closest = null;
                    let minDiff = Infinity;
                    
                    carOptions.forEach(l => {
                        const match = l.driverName.match(/\d+/);
                        if (match) {
                            const bucketIR = parseInt(match[0]);
                            const diff = Math.abs(bucketIR - currentIRating);
                            if (diff < minDiff) {
                                minDiff = diff;
                                closest = l;
                            }
                        }
                    });
                    if (closest) filteredIRDLaps.push(closest);
                });

                const finalLaps = [...g61Laps, ...filteredIRDLaps].sort((a,b) => a.lapTime.localeCompare(b.lapTime));

                let html = `
                    <table style="width: 100%; border-collapse: collapse; font-size: 0.85rem; text-align: left;">
                        <thead>
                            <tr style="border-bottom: 1px solid rgba(255,255,255,0.1); color: var(--primary);">
                                <th style="padding: 1rem 0.5rem;">#</th>
                                <th style="padding: 1rem 0.5rem;">Driver / Benchmark</th>
                                <th style="padding: 1rem 0.5rem;">Car</th>
                                <th style="padding: 1rem 0.5rem;">Lap Time</th>
                                <th style="padding: 1rem 0.5rem;">Season</th>
                                <th style="padding: 1rem 0.5rem; text-align: right;">Updated</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                let rank = 1;
                finalLaps.forEach(d => {
                    const ago = d.timestamp ? formatTimeAgo(d.timestamp.toDate()) : '...';
                    const isBenchmark = d.source === 'iRacingData';
                    html += `
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.03); ${isBenchmark ? 'background: rgba(0,207,255,0.03);' : ''}">
                            <td style="padding: 1rem 0.5rem; color: var(--text-muted);">${rank++}</td>
                            <td style="padding: 1rem 0.5rem; font-weight: 700; color: ${isBenchmark ? 'var(--primary)' : 'white'};">
                                ${d.driverName}
                                ${isBenchmark ? '<span style="font-size:0.6rem; margin-left:5px; opacity:0.6;">(iR Benchmark)</span>' : ''}
                            </td>
                            <td style="padding: 1rem 0.5rem; font-size: 0.75rem;">${d.car} <span style="color:var(--primary); font-size:0.6rem;">[${d.carClass}]</span></td>
                            <td style="padding: 1rem 0.5rem; font-family: monospace; color: var(--primary); font-weight: 700;">${d.lapTime}</td>
                            <td style="padding: 1rem 0.5rem; font-size: 0.75rem; color: var(--text-muted);">${d.season || 'N/A'}</td>
                            <td style="padding: 1rem 0.5rem; text-align: right; font-size: 0.75rem; color: var(--text-muted);">${ago}</td>
                        </tr>
                    `;
                });

                html += `</tbody></table>`;
                if (finalLaps.length === 0) {
                    html = '<p style="text-align: center; color: var(--text-muted); padding: 2rem;">No matching data for your iRating and Class.</p>';
                }
                container.innerHTML = html;
            } catch (error) {
                console.error("Telemetry error:", error);
                let errorMsg = "Error loading lap data.";
                if (error.message.includes("index")) {
                    errorMsg = `Firestore missing index. <a href="${error.message.split(' ').find(word => word.startsWith('https://'))}" target="_blank" style="color: var(--primary); text-decoration: underline;">Click here to create the required index</a>.`;
                } else {
                    errorMsg += " " + error.message;
                }
                container.innerHTML = `<p style="color: #ff0055; font-size: 0.8rem; padding: 1rem;">${errorMsg}</p>`;
            }
        }

        function formatTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + "y ago";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + "mo ago";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + "d ago";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + "h ago";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + "m ago";
            return Math.floor(seconds) + "s ago";
        }

        async function initPortal(user) {
            const loading = document.getElementById('loading-portal');
            const portal = document.getElementById('portal-view');
            const denied = document.getElementById('denied-view');
            const deniedReason = document.getElementById('denied-reason');

            try {
                // 1. Check Admin Status
                const MASTER_ADMIN = 'B0t4f4nqqpZIQKpT8Ed97xka5gM2';
                isAdminUser = (user.uid === MASTER_ADMIN);
                
                if (!isAdminUser) {
                    const adminDoc = await db.collection("settings").doc("admins").get();
                    if (adminDoc.exists) {
                        const adminList = adminDoc.data().uids || [];
                        isAdminUser = adminList.includes(user.uid);
                    }
                }

                // 2. Check Verification (Skip for Admins)
                if (!isAdminUser) {
                    const claimDoc = await db.collection("claims").where("discordId", "==", user.uid).get();
                    if (claimDoc.empty || claimDoc.docs[0].data().status !== 'verified') {
                        loading.style.display = 'none';
                        denied.style.display = 'block';
                        deniedReason.textContent = "You must be a verified team member to access the portal. Please claim your profile on the Roster page.";
                        return;
                    }
                }

                // 3. Load User Profile
                const userDoc = await db.collection("users").doc(user.uid).get();
                userProfile = userDoc.exists ? userDoc.data() : { driverName: user.displayName };
                const myName = userProfile.driverName || user.displayName;

                // 4. Find Teams
                const lineups = await db.collection("race_lineups").get();
                const myTeams = [];
                const allTeamAssignments = [];

                lineups.forEach(doc => {
                    const data = doc.data();
                    const slug = doc.id;
                    if (data.teams) {
                        data.teams.forEach(team => {
                            const teamObj = {
                                eventSlug: slug,
                                eventName: data.eventName || slug.split('-').map(s => s.charAt(0).toUpperCase() + s.slice(1)).join(' '),
                                teamName: team.name,
                                teamData: team
                            };
                            allTeamAssignments.push(teamObj);
                            
                            const isCaptain = team.captain === myName;
                            const isDriver = team.drivers && team.drivers.includes(myName);
                            if (isCaptain || isDriver) {
                                myTeams.push(teamObj);
                            }
                        });
                    }
                });

                loading.style.display = 'none';

                if (isAdminUser) {
                    showSelection(allTeamAssignments, true);
                } else if (myTeams.length === 0) {
                    showSelection([], false); // Still show sign-ups
                } else if (myTeams.length === 1 && !window.location.hash) {
                    loadTeamPortal(myTeams[0]);
                } else {
                    showSelection(myTeams, false);
                }

            } catch (error) {
                console.error("Portal Init Error:", error);
                loading.innerHTML = `<p style="color: #ff0055;">Error: ${error.message}</p>`;
            }
        }

        async function showSelection(teams, isAdmin) {
            const container = document.getElementById('selection-view');
            const grid = document.getElementById('event-selection-grid');
            
            let html = `
                <div style="margin-bottom: 4rem;">
                    <h2 class="section-title">${isAdminUser ? 'Admin: All Event Lineups' : 'Your Assigned Events'}</h2>
                    <div class="grid">`;
            
            if (teams.length === 0) {
                html += `<p style="color: var(--text-muted); grid-column: 1/-1; text-align: center; padding: 2rem;">No active team assignments found.</p>`;
            } else {
                window._assignedTeams = teams;
                teams.forEach((t, idx) => {
                    html += `
                        <div class="card glass" onclick="loadTeamPortal(window._assignedTeams[${idx}])" style="cursor: pointer;">
                            <div class="event-meta">${t.teamName}</div>
                            <h3>${t.eventName}</h3>
                            <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 1rem;">Click to Enter Portal</p>
                        </div>
                    `;
                });
            }

            html += `</div></div>`;

            // Availability Section
            html += `
                <div style="margin-bottom: 4rem;">
                    <h2 class="section-title">Upcoming Event Sign-ups</h2>
                    <div id="availability-grid" class="grid">
                        <!-- Populated via JS -->
                    </div>
                </div>
            `;

            // Admin Results Section
            if (isAdminUser) {
                html += `
                    <div style="margin-bottom: 4rem;">
                        <h2 class="section-title">Admin Dashboard: Driver Accessibility</h2>
                        <div id="admin-availability-results" class="glass" style="padding: 2rem; overflow-x: auto;">
                            <p>Loading summary...</p>
                        </div>
                    </div>
                `;
            }

            container.innerHTML = `<h1 class="glow-text" style="margin-bottom: 3rem;">Team Portal Dashboard</h1>` + html;
            container.style.display = 'block';

            // Populate Availability Buttons
            populateAvailability();

            if (isAdminUser) {
                loadAdminAvailability();
            }
        }

        async function populateAvailability() {
            const availGrid = document.getElementById('availability-grid');
            if (!availGrid) return;
            
            // Initial load or rebuild? Check if cards exist
            const hasCards = availGrid.querySelectorAll('.event-card').length === UPCOMING_EVENTS.length;
            
            for (const event of UPCOMING_EVENTS) {
                let card = availGrid.querySelector(`[data-event-id="${event.id}"]`);
                
                // Fetch current status
                let currentStatus = null;
                let preferredSlot = null;
                try {
                    const statusDoc = await db.collection("event_availability").doc(event.id).collection("responses").doc(auth.currentUser.uid).get();
                    if (statusDoc.exists) {
                        currentStatus = statusDoc.data().status;
                        preferredSlot = statusDoc.data().preferredSlot;
                    }
                } catch (e) { console.warn("Could not fetch status for", event.id); }

                if (!card) {
                    card = document.createElement('div');
                    card.className = "card glass event-card";
                    card.setAttribute('data-event-id', event.id);
                    card.style.padding = "1.5rem";
                    availGrid.appendChild(card);
                }

                // Update content only if needed (or always if we want precise states)
                let slotsHtml = '';
                if (event.slots && currentStatus === 'signed_up') {
                    slotsHtml = `
                        <div style="margin-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
                            <label style="font-size: 0.6rem; color: var(--primary); display:block; margin-bottom: 0.5rem; text-transform: uppercase;">Timeslot Preference</label>
                            <select onchange="updatePreference('${event.id}', this.value)" class="btn btn-outline" style="width: 100%; font-size: 0.7rem; padding: 0.4rem;">
                                <option value="">-- Select Preference --</option>
                                ${event.slots.map(s => `<option value="${s}" ${preferredSlot === s ? 'selected' : ''}>${s}</option>`).join('')}
                            </select>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem;">
                        <div class="event-meta">${event.date}</div>
                        <div id="countdown-${event.id}" style="font-size: 0.6rem; font-weight: 700; color: var(--primary); font-family: monospace; background: rgba(0,207,255,0.1); padding: 2px 6px; border-radius: 4px;">--:--:--:--</div>
                    </div>
                    <h3 style="font-size: 1rem;">${event.name}</h3>
                    <div style="display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1.5rem;">
                        <button onclick="setAvailability('${event.id}', 'signed_up')" class="btn ${currentStatus === 'signed_up' ? 'btn-primary' : 'btn-outline'}" style="padding: 0.5rem; font-size: 0.7rem;">Sign Up</button>
                        <button onclick="setAvailability('${event.id}', 'not_interested')" class="btn ${currentStatus === 'not_interested' ? 'btn-primary' : 'btn-outline'}" style="padding: 0.5rem; font-size: 0.7rem; background: ${currentStatus === 'not_interested' ? '#444' : ''};">Not Interested</button>
                        <button onclick="setAvailability('${event.id}', 'unavailable')" class="btn ${currentStatus === 'unavailable' ? 'btn-primary' : 'btn-outline'}" style="padding: 0.5rem; font-size: 0.7rem; background: ${currentStatus === 'unavailable' ? '#600' : ''};">Not Available</button>
                    </div>
                    ${slotsHtml}
                `;
            }
            startCountdowns();
        }

        let countdownInterval = null;
        function startCountdowns() {
            if (countdownInterval) clearInterval(countdownInterval);
            
            const update = () => {
                const now = new Date().getTime();
                UPCOMING_EVENTS.forEach(event => {
                    const el = document.getElementById(`countdown-${event.id}`);
                    if (!el || !event.startDate) return;

                    const target = new Date(event.startDate).getTime();
                    const diff = target - now;

                    if (diff <= 0) {
                        el.textContent = "LIVE";
                        el.style.color = "#00ff88";
                        return;
                    }

                    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const secs = Math.floor((diff % (1000 * 60)) / 1000);

                    el.textContent = `${days}d ${hours}h ${mins}m ${secs}s`;
                });
            };

            update();
            countdownInterval = setInterval(update, 1000);
        }

        async function updatePreference(eventId, slot) {
            try {
                await db.collection("event_availability").doc(eventId).collection("responses").doc(auth.currentUser.uid).update({
                    preferredSlot: slot
                });
                if (isAdminUser) loadAdminAvailability();
            } catch (error) {
                console.error("Error updating preference:", error);
            }
        }

        async function setAvailability(eventId, status) {
            try {
                const docRef = db.collection("event_availability").doc(eventId).collection("responses").doc(auth.currentUser.uid);
                const currentDoc = await docRef.get();
                const currentStatus = currentDoc.exists ? currentDoc.data().status : null;

                if (currentStatus === status) {
                    await docRef.delete();
                } else {
                    const myName = userProfile.driverName || auth.currentUser.displayName;
                    await docRef.set({
                        status: status,
                        driverName: myName,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }

                // Refresh only the logic states, but keep DOM stable
                populateAvailability();
                if (isAdminUser) loadAdminAvailability();
            } catch (error) {
                console.error("Error updating availability:", error);
                alert("Error: " + error.message);
            }
        }

        async function loadAdminAvailability() {
            const resultsDiv = document.getElementById('admin-availability-results');
            if (!resultsDiv) return;

            try {
                let html = `
                    <table style="width: 100%; border-collapse: collapse; font-size: 0.8rem; text-align: left;">
                        <thead>
                            <tr style="border-bottom: 1px solid var(--glass-border);">
                                <th style="padding: 1rem;">Driver</th>
                                ${UPCOMING_EVENTS.map(e => `<th style="padding: 1rem; white-space: nowrap;">${e.name.split(' ').slice(0,2).join(' ')}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody>
                `;

                // Fetch all unique drivers who have responded
                const allDrivers = {}; // uid -> name
                const allResponses = {}; // eventId -> { uid -> status }

                for (const event of UPCOMING_EVENTS) {
                    const snap = await db.collection("event_availability").doc(event.id).collection("responses").get();
                    allResponses[event.id] = {};
                    snap.forEach(doc => {
                        const data = doc.data();
                        allDrivers[doc.id] = data.driverName;
                        allResponses[event.id][doc.id] = data.status;
                    });
                }

                const driverUids = Object.keys(allDrivers).sort((a,b) => allDrivers[a].localeCompare(allDrivers[b]));

                if (driverUids.length === 0) {
                    html += `<tr><td colspan="${UPCOMING_EVENTS.length + 1}" style="padding: 2rem; text-align: center; color: var(--text-muted);">No responses received yet.</td></tr>`;
                } else {
                    driverUids.forEach(uid => {
                        html += `<tr style="border-bottom: 1px solid rgba(255,255,255,0.03);">
                            <td style="padding: 0.8rem; font-weight: 700; color: var(--primary);">${allDrivers[uid]}</td>
                        `;
                        UPCOMING_EVENTS.forEach(event => {
                            const status = allResponses[event.id][uid];
                            let statusHtml = "–";
                            if (status === 'signed_up') statusHtml = `<span style="color: #00ff88;">YES</span>`;
                            if (status === 'not_interested') statusHtml = `<span style="color: #888;">N/I</span>`;
                            if (status === 'unavailable') statusHtml = `<span style="color: #ff0055;">N/A</span>`;
                            html += `<td style="padding: 0.8rem; text-align: center;">${statusHtml}</td>`;
                        });
                        html += `</tr>`;
                    });
                }

                html += `</tbody></table>`;
                resultsDiv.innerHTML = html;

            } catch (error) {
                console.error("Error loading admin availability:", error);
                resultsDiv.innerHTML = `<p style="color: #ff0055;">Error loading results.</p>`;
            }
        }

        // Auth Listener
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                initPortal(user);
            } else {
                window.location.href = "login.html";
            }
        });

        // Enter key for chat
        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
