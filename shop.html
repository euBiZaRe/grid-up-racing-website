<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | GRID UP</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,600;0,800;0,900;1,400;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase SDks -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    
    <style>
        /* Responsive iframe container to hide scrollbars and fit viewport under navbar */
        .shop-container {
            width: 100%;
            height: calc(100vh - 70px); /* Adjust based on navbar height */
            margin-top: 70px;
            overflow: hidden;
            position: relative;
        }
        
        .shop-iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        /* Subtle loading spinner beneath the iframe */
        .loader-wrapper {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }
    </style>
</head>
<body class="shop-landing-page">
    <nav id="navbar" class="scrolled">
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <img src="assets/logo.png" alt="GRID UP" style="height: 40px; vertical-align: middle;">
            </a>
            <ul class="nav-links">
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="roster.html">Roster</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="shop.html" class="active" style="color: var(--primary);">Shop</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li><a href="login.html" id="login-link" class="btn btn-outline" style="padding: 0.5rem 1.25rem; font-size: 0.8rem; margin-left: 1rem;">Login</a></li>
            </ul>
        </div>
    </nav>
    
    <header class="hero" style="min-height: 100vh; display: flex; align-items: center; padding-top: 70px; background: none; position: relative; overflow: hidden;">
        <div class="tread-overlay" style="opacity: 0.2;"></div>
        <div class="container hero-content" style="z-index: 2; position: relative;">
            <p style="color: var(--primary); font-weight: 800; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 1rem;">Official Merchandise</p>
            <h1 class="glow-text" style="font-size: 5rem; margin-bottom: 2rem;">GRID UP STORE</h1>
            <p style="color: var(--text-muted); font-size: 1.2rem; max-width: 600px; margin: 0 auto 3rem; line-height: 1.6;">
                Gear up with the official Grid Up apparel and accessories. Secure your spot on the grid with premium sim racing merchandise.
            </p>
            <a href="https://gridup.shop/" target="_blank" rel="noopener noreferrer" class="btn btn-primary" style="font-size: 1.2rem; padding: 1.2rem 3rem; background: linear-gradient(135deg, var(--primary), #0099cc); box-shadow: 0 0 30px rgba(0,207,255,0.4); border: none; letter-spacing: 2px;">
                ENTER THE SHOP <span style="margin-left: 10px;">→</span>
            </a>
        </div>
    </header>

    <!-- Init Firebase -->
    <script src="js/auth.js"></script>
</body>
</html>
