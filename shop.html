<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | GRID UP</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,600;0,800;0,900;1,400;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase SDks -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    
    <style>
        /* Responsive iframe container to hide scrollbars and fit viewport under navbar */
        .shop-container {
            width: 100%;
            height: calc(100vh - 70px); /* Adjust based on navbar height */
            margin-top: 70px;
            overflow: hidden;
            position: relative;
        }
        
        .shop-iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        /* Subtle loading spinner beneath the iframe */
        .loader-wrapper {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }
    </style>
</head>
<body style="overflow: hidden; padding-top: 0;"> <!-- Prevent double scrollbars -->
    <nav id="navbar" class="scrolled"> <!-- Force solid navbar for instant clarity -->
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <img src="assets/logo.png" alt="GRID UP" style="height: 40px; vertical-align: middle;">
            </a>
            <ul class="nav-links">
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="roster.html">Roster</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="shop.html" class="active" style="color: var(--primary);">Shop</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li><a href="login.html" id="login-link" class="btn btn-outline" style="padding: 0.5rem 1.25rem; font-size: 0.8rem; margin-left: 1rem;">Login</a></li>
            </ul>
        </div>
    </nav>
    
    <div class="shop-container tread-overlay">
        <div class="loader-wrapper">
            <p style="color: var(--primary); font-weight: 800; letter-spacing: 3px; animation: liveDot 1s infinite;">LOADING SHOP...</p>
        </div>
        <iframe src="https://gridup.shop/" class="shop-iframe" title="Grid Up Shop" _onload="this.style.opacity = 1" style="opacity: 0; transition: opacity 0.5s ease; background: transparent;"></iframe>
    </div>

    <!-- Init Firebase -->
    <script src="auth.js"></script>
    <script>
        // Use iframe onload to fade it in smoothly over the loader
        const iframe = document.querySelector('.shop-iframe');
        iframe.onload = () => {
            iframe.style.opacity = '1';
        };
    </script>
</body>
</html>
